<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0e1320;
    --blue: #4d6ef5;

    --white: #fafaf8;
    --gray-100: #f0ede8;
    --gray-200: #e0ddd8;
    --gray-400: #9a9690;
    --gray-600: #5a5753;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--gray-100); color: var(--navy); min-height: 100vh; }

  /* WRAPPER - ei fullwidth */
  .page-wrap { max-width: 900px; margin: 0 auto; padding: 32px 24px 64px; }

  /* TOPBAR */
  .topbar { background: var(--white); border: 1px solid var(--gray-200); border-radius: 8px; display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; margin-bottom: 12px; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 18px; letter-spacing: -0.02em; color: var(--navy); display: flex; align-items: center; gap: 7px; }
  .logo-arrow { color: var(--blue); }
  .logo-tag { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--gray-400); letter-spacing: 0.08em; text-transform: uppercase; }
  .validity-badge { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray-400); }
  .validity-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); flex-shrink: 0; }
  .validity-badge strong { color: var(--navy); font-weight: 500; }

  /* CONFIDENTIAL BAR */
  .confidential-bar { background: var(--blue-light); border: 1px solid #d0d8fc; border-radius: 6px; padding: 10px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .confidential-bar svg { width: 13px; height: 13px; stroke: var(--blue); flex-shrink: 0; }
  .confidential-bar p { font-size: 12px; color: var(--blue); }

  /* COUNTDOWN */
  .countdown-bar { background: var(--navy); border-radius: 6px; padding: 12px 24px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .countdown-label { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 0.1em; text-transform: uppercase; }
  .countdown-timer { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--white); letter-spacing: 0.02em; }
  .countdown-timer span { font-family: 'DM Sans', sans-serif; font-size: 11px; color: rgba(255,255,255,0.4); margin-left: 3px; margin-right: 8px; }

  /* HERO CARD */
  .hero-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 8px; padding: 40px; margin-bottom: 12px; display: grid; grid-template-columns: 1fr auto; gap: 48px; align-items: center; }
  .hero-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue); margin-bottom: 16px; font-weight: 500; }
  .hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(32px, 4.5vw, 52px); line-height: 1.06; letter-spacing: -0.02em; }
  .hero h1 em { font-style: italic; color: var(--gray-400); }
  .hero-sub { font-size: 15px; color: var(--gray-600); margin-top: 16px; line-height: 1.65; max-width: 440px; }
  .hero-contact { text-align: center; flex-shrink: 0; }
  .hero-contact img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: block; margin: 0 auto 10px; }
  .hero-contact-role { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); margin-bottom: 4px; }
  .hero-contact-name { font-size: 14px; font-weight: 500; color: var(--navy); }
  .hero-contact-tagline { font-size: 12px; color: var(--gray-400); margin-top: 6px; line-height: 1.5; max-width: 160px; font-style: italic; }
  .hero-contact-email { display: block; font-size: 12px; color: var(--blue); margin-top: 8px; text-decoration: none; }

  /* CARD BASE */
  .card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
  .card-pad { padding: 32px 40px; }
  .section-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 24px; font-weight: 500; }
